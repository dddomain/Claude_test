<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskGrid — オフラインタスク管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="logo">
        <span class="logo-icon">▦</span>
        <span class="logo-text">TaskGrid</span>
      </div>
      <nav>
        <button class="nav-btn active" data-view="dashboard">
          <span class="nav-icon">⬡</span> ダッシュボード
        </button>
        <button class="nav-btn" data-view="tasks">
          <span class="nav-icon">≡</span> タスク一覧
        </button>
      </nav>
      <div class="sidebar-footer">
        <span id="save-indicator">● 保存済み</span>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">

      <!-- ===== DASHBOARD VIEW ===== -->
      <section id="view-dashboard" class="view active">
        <div class="view-header">
          <h1>ダッシュボード</h1>
          <span id="today-date" class="subtitle"></span>
        </div>

        <!-- KPI cards -->
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">総タスク</div>
            <div class="kpi-value" id="kpi-total">0</div>
          </div>
          <div class="kpi-card accent-green">
            <div class="kpi-label">完了</div>
            <div class="kpi-value" id="kpi-done">0</div>
          </div>
          <div class="kpi-card accent-blue">
            <div class="kpi-label">進行中</div>
            <div class="kpi-value" id="kpi-progress">0</div>
          </div>
          <div class="kpi-card accent-gray">
            <div class="kpi-label">未着手</div>
            <div class="kpi-value" id="kpi-todo">0</div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">完了率</span>
            <span id="pct-label" class="card-badge">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="progress-sub">
            <span id="progress-msg"></span>
          </div>
        </div>

        <!-- Charts row -->
        <div class="charts-row">
          <!-- Priority breakdown -->
          <div class="card flex-1">
            <div class="card-header">
              <span class="card-title">優先度別</span>
            </div>
            <div id="priority-bars"></div>
          </div>

          <!-- Status breakdown -->
          <div class="card flex-1">
            <div class="card-header">
              <span class="card-title">カテゴリ別</span>
            </div>
            <div id="category-bars"></div>
          </div>
        </div>

        <!-- Upcoming tasks -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">期限が近いタスク</span>
            <button class="btn-text" data-view="tasks">すべて表示 →</button>
          </div>
          <div id="upcoming-list"></div>
        </div>
      </section>

      <!-- ===== TASKS VIEW ===== -->
      <section id="view-tasks" class="view">
        <div class="view-header">
          <h1>タスク一覧</h1>
          <div class="toolbar">
            <input type="text" id="search-input" placeholder="検索..." class="search-input" />
            <select id="filter-status" class="filter-select">
              <option value="">すべてのステータス</option>
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
              <option value="保留">保留</option>
            </select>
            <select id="filter-priority" class="filter-select">
              <option value="">すべての優先度</option>
              <option value="高">高</option>
              <option value="中">中</option>
              <option value="低">低</option>
            </select>
            <button id="btn-add-task" class="btn-primary">+ 追加</button>
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
          <table id="task-table">
            <thead>
              <tr>
                <th class="col-check"><input type="checkbox" id="select-all" /></th>
                <th class="col-id sortable" data-col="id"># <span class="sort-arrow"></span></th>
                <th class="col-name sortable" data-col="name">タスク名 <span class="sort-arrow"></span></th>
                <th class="col-cat sortable" data-col="category">カテゴリ <span class="sort-arrow"></span></th>
                <th class="col-pri sortable" data-col="priority">優先度 <span class="sort-arrow"></span></th>
                <th class="col-sta sortable" data-col="status">ステータス <span class="sort-arrow"></span></th>
                <th class="col-due sortable" data-col="due">期限 <span class="sort-arrow"></span></th>
                <th class="col-note">メモ</th>
                <th class="col-act"></th>
              </tr>
            </thead>
            <tbody id="task-tbody"></tbody>
          </table>
          <div id="empty-state" class="empty-state" style="display:none">
            <div class="empty-icon">☐</div>
            <p>タスクがありません。「+ 追加」から作成しましょう。</p>
          </div>
        </div>

        <!-- Bulk action bar -->
        <div id="bulk-bar" class="bulk-bar" style="display:none">
          <span id="bulk-count"></span> 件選択中
          <button class="btn-danger" id="btn-delete-selected">削除</button>
          <button class="btn-outline" id="btn-status-done">完了にする</button>
        </div>
      </section>
    </main>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">タスクを追加</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="task-form" autocomplete="off">
        <div class="form-group">
          <label for="f-name">タスク名 <span class="required">*</span></label>
          <input type="text" id="f-name" required placeholder="タスクの内容を入力..." />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-category">カテゴリ</label>
            <input type="text" id="f-category" list="category-list" placeholder="例: 仕事, 個人..." />
            <datalist id="category-list"></datalist>
          </div>
          <div class="form-group">
            <label for="f-priority">優先度</label>
            <select id="f-priority">
              <option value="中">中</option>
              <option value="高">高</option>
              <option value="低">低</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-status">ステータス</label>
            <select id="f-status">
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
              <option value="保留">保留</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-due">期限</label>
            <input type="date" id="f-due" />
          </div>
        </div>
        <div class="form-group">
          <label for="f-note">メモ</label>
          <textarea id="f-note" rows="2" placeholder="補足情報..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-outline" id="modal-cancel">キャンセル</button>
          <button type="submit" class="btn-primary" id="modal-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== CONFIRM DIALOG ===== -->
  <div id="confirm-overlay" class="modal-overlay" style="display:none">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="confirm-title">確認</h2>
      </div>
      <p id="confirm-msg" class="confirm-msg"></p>
      <div class="modal-footer">
        <button class="btn-outline" id="confirm-cancel">キャンセル</button>
        <button class="btn-danger" id="confirm-ok">削除</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
