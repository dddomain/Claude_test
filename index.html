<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskGrid — オフラインタスク管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="h-full text-gray-900 bg-gray-50">
  <div id="app" class="flex h-screen overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <aside id="sidebar" class="w-[220px] min-w-[220px] bg-white border-r border-gray-200 flex flex-col py-5 px-3 gap-6">
      <div class="flex items-center gap-2 px-2">
        <span class="text-xl text-blue-600">▦</span>
        <span class="text-base font-bold tracking-tight">TaskGrid</span>
      </div>
      <nav class="flex flex-col gap-1">
        <button class="nav-btn active" data-view="dashboard">
          <span class="text-sm w-4 text-center">⬡</span> ダッシュボード
        </button>
        <button class="nav-btn" data-view="tasks">
          <span class="text-sm w-4 text-center">≡</span> タスク一覧
        </button>
      </nav>
      <div class="mt-auto px-2 text-[11px] text-gray-400">
        <span id="save-indicator">● 保存済み</span>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="main" class="flex-1 overflow-y-auto flex flex-col">

      <!-- ===== DASHBOARD VIEW ===== -->
      <section id="view-dashboard" class="view active">
        <div class="flex items-end justify-between gap-4 flex-wrap">
          <h1 class="text-[22px] font-bold tracking-tight">ダッシュボード</h1>
          <span id="today-date" class="text-[13px] text-gray-500"></span>
        </div>

        <!-- KPI cards -->
        <div class="grid grid-cols-4 gap-3 max-lg:grid-cols-2">
          <div class="kpi-card bg-white border border-gray-200 rounded-lg p-5 relative overflow-hidden">
            <div class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2">総タスク</div>
            <div class="text-4xl font-bold leading-none tracking-tighter" id="kpi-total">0</div>
          </div>
          <div class="kpi-card accent-green bg-white border border-gray-200 rounded-lg p-5 relative overflow-hidden">
            <div class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2">完了</div>
            <div class="text-4xl font-bold leading-none tracking-tighter" id="kpi-done">0</div>
          </div>
          <div class="kpi-card accent-blue bg-white border border-gray-200 rounded-lg p-5 relative overflow-hidden">
            <div class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2">進行中</div>
            <div class="text-4xl font-bold leading-none tracking-tighter" id="kpi-progress">0</div>
          </div>
          <div class="kpi-card accent-gray bg-white border border-gray-200 rounded-lg p-5 relative overflow-hidden">
            <div class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2">未着手</div>
            <div class="text-4xl font-bold leading-none tracking-tighter" id="kpi-todo">0</div>
          </div>
        </div>

        <!-- Progress card -->
        <div class="bg-white border border-gray-200 rounded-lg p-5">
          <div class="flex items-center justify-between mb-4">
            <span class="text-[13px] font-semibold text-gray-500 uppercase tracking-wide">完了率</span>
            <span id="pct-label" class="text-xl font-bold">0%</span>
          </div>
          <div class="h-2.5 bg-gray-100 rounded-full overflow-hidden mb-2">
            <div class="progress-fill h-full rounded-full" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="text-xs text-gray-500" id="progress-msg"></div>
        </div>

        <!-- Charts row -->
        <div class="flex gap-3 max-lg:flex-col">
          <div class="bg-white border border-gray-200 rounded-lg p-5 flex-1">
            <div class="flex items-center justify-between mb-4">
              <span class="text-[13px] font-semibold text-gray-500 uppercase tracking-wide">優先度別</span>
            </div>
            <div id="priority-bars"></div>
          </div>
          <div class="bg-white border border-gray-200 rounded-lg p-5 flex-1">
            <div class="flex items-center justify-between mb-4">
              <span class="text-[13px] font-semibold text-gray-500 uppercase tracking-wide">カテゴリ別</span>
            </div>
            <div id="category-bars"></div>
          </div>
        </div>

        <!-- Upcoming tasks -->
        <div class="bg-white border border-gray-200 rounded-lg p-5">
          <div class="flex items-center justify-between mb-4">
            <span class="text-[13px] font-semibold text-gray-500 uppercase tracking-wide">期限が近いタスク</span>
            <button class="text-blue-600 text-[13px] font-medium hover:underline" data-view="tasks">すべて表示 →</button>
          </div>
          <div id="upcoming-list"></div>
        </div>
      </section>

      <!-- ===== TASKS VIEW ===== -->
      <section id="view-tasks" class="view">
        <div class="flex items-end justify-between gap-4 flex-wrap">
          <h1 class="text-[22px] font-bold tracking-tight">タスク一覧</h1>
          <div class="flex items-center gap-2 flex-wrap">
            <input type="text" id="search-input" placeholder="検索..." class="form-input w-44" />
            <select id="filter-status" class="form-input" style="width:auto">
              <option value="">すべてのステータス</option>
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
              <option value="保留">保留</option>
            </select>
            <select id="filter-priority" class="form-input" style="width:auto">
              <option value="">すべての優先度</option>
              <option value="高">高</option>
              <option value="中">中</option>
              <option value="低">低</option>
            </select>
            <button id="btn-add-task" class="btn-primary-sm">+ 追加</button>
          </div>
        </div>

        <!-- Table -->
        <div class="bg-white border border-gray-200 rounded-lg overflow-auto flex-1">
          <table id="task-table" class="w-full">
            <thead>
              <tr>
                <th class="th-cell w-9"><input type="checkbox" id="select-all" /></th>
                <th class="th-cell sortable w-12" data-col="id"># <span class="sort-arrow"></span></th>
                <th class="th-cell sortable min-w-[200px]" data-col="name">タスク名 <span class="sort-arrow"></span></th>
                <th class="th-cell sortable w-[110px] max-md:hidden" data-col="category">カテゴリ <span class="sort-arrow"></span></th>
                <th class="th-cell sortable w-20" data-col="priority">優先度 <span class="sort-arrow"></span></th>
                <th class="th-cell sortable w-[90px]" data-col="status">ステータス <span class="sort-arrow"></span></th>
                <th class="th-cell sortable w-[110px]" data-col="due">期限 <span class="sort-arrow"></span></th>
                <th class="th-cell min-w-[140px] max-md:hidden">メモ</th>
                <th class="th-cell w-[72px]"></th>
              </tr>
            </thead>
            <tbody id="task-tbody"></tbody>
          </table>
          <div id="empty-state" class="py-16 text-center text-gray-400" style="display:none">
            <div class="text-5xl mb-3">☐</div>
            <p class="text-[13px]">タスクがありません。「+ 追加」から作成しましょう。</p>
          </div>
        </div>

        <!-- Bulk action bar -->
        <div id="bulk-bar" class="flex items-center gap-3 px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-[13px]" style="display:none">
          <span id="bulk-count"></span> 件選択中
          <button class="btn-danger-sm" id="btn-delete-selected">削除</button>
          <button class="btn-outline-sm" id="btn-status-done">完了にする</button>
        </div>
      </section>
    </main>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/35 flex items-center justify-center z-50 modal-overlay" style="display:none">
    <div class="modal bg-white rounded-lg shadow-xl" style="width:520px;max-width:calc(100vw - 2rem)">
      <div class="flex items-center justify-between px-6 pt-5 mb-5">
        <h2 class="text-base font-bold" id="modal-title">タスクを追加</h2>
        <button class="text-gray-400 text-base px-1.5 py-1 rounded hover:bg-gray-100 hover:text-gray-800 leading-none" id="modal-close">✕</button>
      </div>
      <form id="task-form" class="px-6" autocomplete="off">
        <div class="flex flex-col gap-1.5 mb-4">
          <label class="text-xs font-semibold text-gray-500" for="f-name">タスク名 <span class="text-red-500">*</span></label>
          <input type="text" id="f-name" required placeholder="タスクの内容を入力..." class="form-input" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col gap-1.5 mb-4">
            <label class="text-xs font-semibold text-gray-500" for="f-category">カテゴリ</label>
            <input type="text" id="f-category" list="category-list" placeholder="例: 仕事, 個人..." class="form-input" />
            <datalist id="category-list"></datalist>
          </div>
          <div class="flex flex-col gap-1.5 mb-4">
            <label class="text-xs font-semibold text-gray-500" for="f-priority">優先度</label>
            <select id="f-priority" class="form-input">
              <option value="中">中</option>
              <option value="高">高</option>
              <option value="低">低</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col gap-1.5 mb-4">
            <label class="text-xs font-semibold text-gray-500" for="f-status">ステータス</label>
            <select id="f-status" class="form-input">
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
              <option value="保留">保留</option>
            </select>
          </div>
          <div class="flex flex-col gap-1.5 mb-4">
            <label class="text-xs font-semibold text-gray-500" for="f-due">期限</label>
            <input type="date" id="f-due" class="form-input" />
          </div>
        </div>
        <div class="flex flex-col gap-1.5 mb-4">
          <label class="text-xs font-semibold text-gray-500" for="f-note">メモ</label>
          <textarea id="f-note" rows="2" placeholder="補足情報..." class="form-input resize-y"></textarea>
        </div>
        <div class="flex justify-end gap-2 py-5 border-t border-gray-200 mt-5">
          <button type="button" class="btn-outline-sm" id="modal-cancel">キャンセル</button>
          <button type="submit" class="btn-primary-sm" id="modal-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== CONFIRM DIALOG ===== -->
  <div id="confirm-overlay" class="fixed inset-0 bg-black/35 flex items-center justify-center z-50 modal-overlay" style="display:none">
    <div class="modal bg-white rounded-lg shadow-xl p-6" style="width:360px;max-width:calc(100vw - 2rem)">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-base font-bold" id="confirm-title">確認</h2>
      </div>
      <p id="confirm-msg" class="text-sm text-gray-500 mb-5 leading-relaxed"></p>
      <div class="flex justify-end gap-2">
        <button class="btn-outline-sm" id="confirm-cancel">キャンセル</button>
        <button class="btn-danger-sm" id="confirm-ok">削除</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
